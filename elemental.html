<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<link rel="icon" href="img/ona.png" type="image/png">
<title>ELEMENTAL ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated}
:root{
  --fire:#ff4400;--fire2:#ff8800;
  --water:#00aaff;--water2:#0055ff;
  --wind:#aaddff;--wind2:#88bbdd;
  --light:#ffff00;--light2:#ffaa00;
  --shadow:#8800ff;--shadow2:#440088;
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;
  --border:#333355;--text:#e8e8ff;
  --font:'Press Start 2P',monospace;
  --font2:'Cairo',sans-serif;
}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);min-height:100vh;
  overflow-x:hidden;
}
/* CRT effect */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
}

/* ═══ SCREENS ═══ */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.screen.active{display:flex}

/* ═══ TITLE SCREEN ═══ */
#titleScreen{
  background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0a0f 70%);
  gap:0;
}
.title-logo{
  font-size:clamp(16px,4vw,28px);color:#fff;text-align:center;
  margin-bottom:8px;
  text-shadow:0 0 20px rgba(168,85,247,.8),0 0 40px rgba(168,85,247,.4);
  animation:titlePulse 3s ease-in-out infinite;
  letter-spacing:3px;
}
@keyframes titlePulse{0%,100%{text-shadow:0 0 20px rgba(168,85,247,.8)}50%{text-shadow:0 0 40px rgba(255,100,255,1),0 0 80px rgba(168,85,247,.6)}}
.title-sub{
  font-family:var(--font);font-size:8px;color:rgba(168,85,247,.7);
  letter-spacing:4px;margin-bottom:50px;text-align:center;
}

/* pixel art scene في الـ title */
.title-scene{
  position:relative;width:280px;height:140px;margin-bottom:40px;
}
.pixel-char{
  position:absolute;bottom:0;
  width:32px;height:48px;
  image-rendering:pixelated;
}
/* CSS pixel art character */
.hero-sprite{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:32px;height:48px;
  background:
    /* head */
    linear-gradient(#ffd89b,#ffd89b) 8px 0/16px 16px,
    /* eyes */
    linear-gradient(#222,#222) 10px 4px/4px 4px,
    linear-gradient(#222,#222) 18px 4px/4px 4px,
    /* body */
    linear-gradient(#4466ff,#4466ff) 4px 16px/24px 20px,
    /* legs */
    linear-gradient(#333,#333) 4px 36px/10px 12px,
    linear-gradient(#333,#333) 18px 36px/10px 12px;
  background-repeat:no-repeat;
  filter:drop-shadow(0 0 8px rgba(100,150,255,.6));
  animation:heroFloat 2s ease-in-out infinite;
}
@keyframes heroFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* element orbs floating */
.orb{
  position:absolute;width:20px;height:20px;border-radius:50%;
  animation:orbFloat 3s ease-in-out infinite;
}
.orb-fire{background:radial-gradient(circle,#ff8800,#ff2200);box-shadow:0 0 10px #ff4400;top:30px;left:20px;animation-delay:0s}
.orb-water{background:radial-gradient(circle,#00ddff,#0044ff);box-shadow:0 0 10px #00aaff;top:20px;right:20px;animation-delay:.6s}
.orb-wind{background:radial-gradient(circle,#ddffff,#6699bb);box-shadow:0 0 10px #88ccff;top:60px;left:10px;animation-delay:1.2s}
.orb-light{background:radial-gradient(circle,#ffffff,#ffdd00);box-shadow:0 0 10px #ffff00;top:10px;left:50%;animation-delay:1.8s}
.orb-shadow{background:radial-gradient(circle,#aa44ff,#220044);box-shadow:0 0 10px #8800ff;top:55px;right:10px;animation-delay:2.4s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.2)}}

/* pixel floor */
.pixel-floor{
  position:absolute;bottom:0;left:0;right:0;height:10px;
  background:repeating-linear-gradient(90deg,#333 0,#333 8px,#444 8px,#444 16px);
}

.start-btn{
  font-family:var(--font);font-size:12px;color:#000;
  background:linear-gradient(135deg,#00ffaa,#00aaff);
  border:none;padding:14px 32px;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  animation:btnBlink 1.5s step-end infinite;
  letter-spacing:2px;
}
@keyframes btnBlink{0%,100%{opacity:1}49%{opacity:1}50%,99%{opacity:.4}}
.start-btn:hover{animation:none;opacity:1;background:linear-gradient(135deg,#00ffcc,#00ccff)}

/* ═══ ELEMENT SELECT ═══ */
#selectScreen{
  background:radial-gradient(ellipse at center,#0d1a2e 0%,#0a0a0f 70%);
  gap:24px;
}
.select-title{font-size:clamp(10px,2.5vw,14px);color:#fff;text-align:center;margin-bottom:8px}
.select-sub{font-family:var(--font2);font-size:14px;color:#8899aa;margin-bottom:8px}

.elements-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:12px;width:100%;max-width:700px;
}
@media(max-width:600px){.elements-grid{grid-template-columns:repeat(3,1fr)}}

.elem-card{
  background:rgba(255,255,255,.04);
  border:2px solid rgba(255,255,255,.1);
  padding:16px 8px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}
.elem-card:hover,.elem-card.selected{transform:translateY(-4px)}
.elem-card[data-elem="fire"]:hover,.elem-card[data-elem="fire"].selected{border-color:var(--fire);box-shadow:0 0 20px rgba(255,68,0,.4),inset 0 0 20px rgba(255,68,0,.05)}
.elem-card[data-elem="water"]:hover,.elem-card[data-elem="water"].selected{border-color:var(--water);box-shadow:0 0 20px rgba(0,170,255,.4),inset 0 0 20px rgba(0,170,255,.05)}
.elem-card[data-elem="wind"]:hover,.elem-card[data-elem="wind"].selected{border-color:var(--wind);box-shadow:0 0 20px rgba(170,221,255,.4),inset 0 0 20px rgba(170,221,255,.05)}
.elem-card[data-elem="light"]:hover,.elem-card[data-elem="light"].selected{border-color:var(--light);box-shadow:0 0 20px rgba(255,255,0,.4),inset 0 0 20px rgba(255,255,0,.05)}
.elem-card[data-elem="shadow"]:hover,.elem-card[data-elem="shadow"].selected{border-color:var(--shadow);box-shadow:0 0 20px rgba(136,0,255,.4),inset 0 0 20px rgba(136,0,255,.05)}

.elem-icon{font-size:32px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 6px currentColor)}
.elem-name{font-family:var(--font);font-size:7px;display:block;margin-bottom:6px}
.elem-desc{font-family:var(--font2);font-size:10px;color:#8899aa;display:block;line-height:1.4}
.elem-card[data-elem="fire"] .elem-name{color:var(--fire)}
.elem-card[data-elem="water"] .elem-name{color:var(--water)}
.elem-card[data-elem="wind"] .elem-name{color:var(--wind2)}
.elem-card[data-elem="light"] .elem-name{color:var(--light)}
.elem-card[data-elem="shadow"] .elem-name{color:var(--shadow)}

/* ═══ BATTLE SCREEN ═══ */
#battleScreen{
  background:var(--bg);
  flex-direction:column;justify-content:flex-start;
  gap:0;padding:0;
}

/* Top bar */
.battle-topbar{
  width:100%;background:rgba(0,0,0,.5);
  border-bottom:2px solid var(--border);
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.battle-stage{font-size:8px;color:#8899aa}
.battle-lvl{font-size:8px;color:#ffaa00}

/* Battle arena */
.battle-arena{
  flex:1;width:100%;max-width:600px;margin:0 auto;
  display:flex;flex-direction:column;padding:16px;gap:12px;
}

/* HP bars */
.fighters-row{
  display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;
}
.fighter-panel{background:rgba(0,0,0,.4);border:1px solid var(--border);padding:10px}
.fighter-panel.enemy-panel{text-align:left}
.fighter-name{font-size:7px;margin-bottom:6px}
.hp-bar-wrap{background:rgba(255,255,255,.1);height:10px;position:relative;margin-bottom:4px}
.hp-bar{height:100%;transition:width .4s;background:linear-gradient(90deg,#00ff88,#00cc66)}
.hp-bar.low{background:linear-gradient(90deg,#ff4400,#ff8800);animation:hpBlink .4s step-end infinite}
@keyframes hpBlink{50%{opacity:.4}}
.hp-text{font-size:6px;color:#88aaaa}
.mp-bar-wrap{background:rgba(255,255,255,.1);height:6px;margin-bottom:4px}
.mp-bar{height:100%;background:linear-gradient(90deg,#4488ff,#0044ff);transition:width .3s}

/* VS text */
.vs-text{
  font-size:14px;color:#ff4444;
  text-shadow:0 0 10px #ff0000;
  align-self:center;text-align:center;
  animation:vsPulse 1s ease-in-out infinite;
}
@keyframes vsPulse{50%{transform:scale(1.2)}}

/* sprite area */
.sprites-area{
  position:relative;height:160px;
  background:repeating-linear-gradient(90deg,transparent,transparent 15px,rgba(255,255,255,.02) 15px,rgba(255,255,255,.02) 16px),
             repeating-linear-gradient(0deg,transparent,transparent 15px,rgba(255,255,255,.02) 15px,rgba(255,255,255,.02) 16px);
  border:1px solid var(--border);overflow:hidden;
}

/* floor */
.arena-floor{
  position:absolute;bottom:0;left:0;right:0;height:20px;
  background:repeating-linear-gradient(90deg,#1a2a1a 0,#1a2a1a 8px,#1e2e1e 8px,#1e2e1e 16px);
  border-top:2px solid #2a4a2a;
}

/* Player sprite CSS */
.player-sprite{
  position:absolute;
  width:40px;height:60px;
  animation:playerFloat 2s ease-in-out infinite;
}
@keyframes playerFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.player-sprite.attacking{animation:playerAtk .3s ease-out forwards}
@keyframes playerAtk{0%{transform:scaleX(-1) translateX(0)}50%{transform:scaleX(-1) translateX(40px)}100%{transform:scaleX(-1) translateX(0)}}
.player-sprite.hurt{animation:playerHurt .3s steps(2) 2;filter:brightness(3)}
@keyframes playerHurt{50%{transform:translateX(-4px)}}

/* Enemy sprite CSS */
.enemy-sprite{
  position:absolute;
  width:40px;height:52px;
  animation:enemyIdle 1.2s steps(2) infinite;
  transform:scaleX(-1);
}
@keyframes enemyIdle{0%,100%{transform:scaleX(-1) translateY(0)}50%{transform:scaleX(-1) translateY(-4px)}}
.enemy-sprite.attacking{animation:enemyAtk .4s ease-out forwards}
@keyframes enemyAtk{0%{transform:scaleX(-1) translateX(0)}50%{transform:scaleX(-1) translateX(-35px)}100%{transform:scaleX(-1) translateX(0)}}
.enemy-sprite.hurt{animation:enemyHurt .3s steps(2) 2;filter:brightness(3)}
@keyframes enemyHurt{50%{transform:scaleX(-1) translateX(4px)}}
.enemy-sprite.dead{animation:enemyDie .5s ease-out forwards;filter:grayscale(1)}
@keyframes enemyDie{100%{transform:scaleX(-1) translateY(20px);opacity:0}}

/* damage numbers */
.dmg-float{
  position:absolute;font-size:14px;font-weight:900;
  animation:dmgFloat .8s ease-out forwards;
  pointer-events:none;z-index:10;
  text-shadow:2px 2px 0 rgba(0,0,0,.8);
}
@keyframes dmgFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}

/* skill bar */
.skills-bar{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.skill-btn{
  background:rgba(0,0,0,.6);border:2px solid var(--border);
  padding:8px 4px;cursor:pointer;text-align:center;
  transition:all .15s;position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px));
}
.skill-btn:hover:not(:disabled){transform:translateY(-2px)}
.skill-btn:disabled{opacity:.4;cursor:default}
.skill-btn .sk-icon{font-size:18px;display:block;margin-bottom:4px}
.skill-btn .sk-name{font-size:6px;display:block;margin-bottom:3px}
.skill-btn .sk-cost{font-size:5px;color:#4488ff}
.skill-btn .sk-desc{font-size:5px;color:#778899;display:block;font-family:var(--font2);font-size:9px}

/* battle log */
.battle-log{
  background:rgba(0,0,0,.5);border:1px solid var(--border);
  padding:8px;height:70px;overflow-y:auto;
  font-family:var(--font2);font-size:11px;line-height:1.6;
}
.log-line{margin-bottom:2px}
.log-line.good{color:#00ff88}
.log-line.bad{color:#ff4444}
.log-line.info{color:#aabbcc}
.log-line.special{color:#ffaa00}

/* action buttons */
.action-row{display:flex;gap:8px}
.act-btn{
  flex:1;padding:10px;font-family:var(--font);font-size:8px;
  cursor:pointer;border:2px solid;transition:all .15s;
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));
}
.act-btn.flee{border-color:#ff4444;color:#ff4444;background:rgba(255,68,68,.1)}
.act-btn.flee:hover{background:rgba(255,68,68,.2)}
.act-btn.potion{border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,.08)}
.act-btn.potion:hover{background:rgba(0,255,136,.2)}
.act-btn.potion:disabled{opacity:.3;cursor:default}

/* xp bar */
.xp-row{display:flex;align-items:center;gap:8px}
.xp-label{font-size:6px;color:#8899aa;white-space:nowrap}
.xp-bar-wrap{flex:1;background:rgba(255,255,255,.08);height:6px}
.xp-bar{height:100%;background:linear-gradient(90deg,#aa00ff,#ff00aa);transition:width .6s}

/* ═══ RESULT SCREEN ═══ */
#resultScreen{gap:16px;background:radial-gradient(ellipse at center,#1a1a2e,#0a0a0f)}
.result-title{font-size:clamp(14px,4vw,24px);text-align:center}
.result-title.win{color:#ffff00;text-shadow:0 0 20px #ffaa00}
.result-title.lose{color:#ff4444;text-shadow:0 0 20px #ff0000}
.result-stats{
  background:rgba(0,0,0,.5);border:1px solid var(--border);
  padding:16px;width:100%;max-width:380px;
}
.stat-row-r{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:7px}
.stat-val-r{color:#00ff88}

/* ═══ PIXEL ART SPRITES (CSS drawings) ═══ */
/* Generic sprites using CSS box-shadow pixel art */
.sprite-body{position:absolute;image-rendering:pixelated}

/* Overlay aura */
.aura{
  position:absolute;inset:-8px;border-radius:50%;
  animation:auraGlow 1.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes auraGlow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.1)}}

/* status effects */
.status-icon{
  position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  font-size:14px;animation:statusBob .8s ease-in-out infinite;
}
@keyframes statusBob{50%{transform:translateX(-50%) translateY(-4px)}}

/* weakness indicator */
.weakness-badge{
  display:inline-block;font-size:6px;padding:2px 6px;
  background:rgba(255,0,0,.2);border:1px solid #ff4444;color:#ff6666;
  margin-top:4px;
}
.strength-badge{
  display:inline-block;font-size:6px;padding:2px 6px;
  background:rgba(0,255,0,.1);border:1px solid #00ff44;color:#44ff88;
  margin-top:4px;
}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border)}

    /* ── AUDIO VISUAL EFFECTS ── */
    .screen-flash{
      position:fixed;inset:0;pointer-events:none;z-index:9998;
      opacity:0;transition:opacity .1s;
    }
    .screen-flash.show{opacity:1;transition:opacity 0s;}
    @keyframes killShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    @keyframes victoryPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
    .victory-text{
      position:absolute;top:30%;left:50%;transform:translateX(-50%);
      font-size:20px;color:#ffff00;
      text-shadow:0 0 20px #ffaa00,0 0 40px #ff8800;
      animation:victoryPop .4s ease-out;
      pointer-events:none;z-index:20;
      white-space:nowrap;
    }
    /* Status bar below arena */
    .status-bar{
      display:flex;align-items:center;justify-content:center;
      gap:8px;padding:4px 8px;
      font-size:7px;color:#8899aa;min-height:20px;
    }
    .status-icon-bar{font-size:12px;animation:statusBob .6s ease-in-out infinite}
</style>
</head>
<body>

<!-- ══ TITLE SCREEN ══ -->
<div class="screen active" id="titleScreen">
  <div class="title-logo">ELEMENTAL<br>ARENA</div>
  <div class="title-sub">— CHOOSE YOUR POWER —</div>
  <div class="title-scene">
    <div class="orb orb-fire"></div>
    <div class="orb orb-water"></div>
    <div class="orb orb-wind"></div>
    <div class="orb orb-light"></div>
    <div class="orb orb-shadow"></div>
    <div class="hero-sprite"></div>
    <div class="pixel-floor"></div>
  </div>
  <button class="start-btn" onclick="playClick();initAudio();showScreen('selectScreen')">▶ START GAME</button>
  <div style="margin-top:24px;font-family:var(--font2);font-size:11px;color:#445566">اختار عنصرك وقاتل في الساحة</div>
</div>

<!-- ══ ELEMENT SELECT ══ -->
<div class="screen" id="selectScreen">
  <div class="select-title">اختار عنصرك</div>
  <div class="select-sub">كل عنصر له قوى وضعف مختلفة</div>
  <div class="elements-grid">
    <div class="elem-card" data-elem="fire" onclick="playClick();selectElement('fire')">
      <span class="elem-icon">🔥</span>
      <span class="elem-name">النار</span>
      <span class="elem-desc">هجوم عالي، حرق مستمر</span>
    </div>
    <div class="elem-card" data-elem="water" onclick="playClick();selectElement('water')">
      <span class="elem-icon">💧</span>
      <span class="elem-name">الماء</span>
      <span class="elem-desc">شفاء + دفاع قوي</span>
    </div>
    <div class="elem-card" data-elem="wind" onclick="playClick();selectElement('wind')">
      <span class="elem-icon">🌪️</span>
      <span class="elem-name">الريح</span>
      <span class="elem-desc">سرعة عالية، هجوم متعدد</span>
    </div>
    <div class="elem-card" data-elem="light" onclick="playClick();selectElement('light')">
      <span class="elem-icon">✨</span>
      <span class="elem-name">الضوء</span>
      <span class="elem-desc">توازن + تعمية</span>
    </div>
    <div class="elem-card" data-elem="shadow" onclick="playClick();selectElement('shadow')">
      <span class="elem-icon">🌑</span>
      <span class="elem-name">الظل</span>
      <span class="elem-desc">قدرات خاصة مرعبة</span>
    </div>
  </div>
  <div id="elemInfo" style="font-family:var(--font2);font-size:12px;color:#667788;text-align:center;margin-top:8px;min-height:30px"></div>
  <button class="start-btn" id="confirmBtn" style="display:none;margin-top:16px" onclick="playClick();initAudio();startBattle()">▶ قاتل!</button>
  <button onclick="playClick();showScreen('titleScreen')" style="margin-top:12px;font-family:var(--font);font-size:7px;color:#445566;background:none;border:none;cursor:pointer">← رجوع</button>
</div>

<!-- ══ BATTLE SCREEN ══ -->
<div class="screen" id="battleScreen">
  <div id="screenFlash" class="screen-flash"></div>
  <div class="battle-topbar">
    <div class="battle-stage">STAGE <span id="stageNum">1</span></div>
    <div id="elemIndicator" style="font-size:8px"></div>
    <div class="battle-lvl">LV.<span id="lvlNum">1</span></div>
  </div>
  <div class="battle-arena">
    <!-- HP bars: enemy LEFT, player RIGHT -->
    <div class="fighters-row">
      <div class="fighter-panel enemy-panel" id="enemyPanel">
        <div class="fighter-name" id="enemyName">—</div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="enemyHpBar" style="width:100%"></div></div>
        <div class="hp-text">HP: <span id="enemyHpText">—</span></div>
        <div id="enemyWeakness" style="margin-top:4px"></div>
      </div>
      <div class="vs-text">VS</div>
      <div class="fighter-panel" id="playerPanel" style="text-align:right">
        <div class="fighter-name" id="playerName" style="text-align:right">—</div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="playerHpBar" style="width:100%"></div></div>
        <div class="hp-text" style="text-align:right">HP: <span id="playerHpText">100/100</span></div>
        <div class="mp-bar-wrap"><div class="mp-bar" id="playerMpBar" style="width:100%;background:linear-gradient(90deg,#4488ff,#0044ff)"></div></div>
        <div class="hp-text" style="color:#4488ff;text-align:right">MP: <span id="playerMpText">50/50</span></div>
      </div>
    </div>

    <!-- Sprites area -->
    <div class="sprites-area" id="spritesArea">

}

}

}

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

function addLog(msg,type='info'){
  const log=document.getElementById('battleLog');
  const div=document.createElement('div');
  div.className=`log-line ${type}`;
  div.textContent=msg;
  log.appendChild(div);
  log.scrollTop=log.scrollHeight;
  if(log.children.length>40)log.children[0].remove();
}

function showDmg(x,y,val,color='#ff4444',isPlayer=false){
  const area=document.getElementById('spritesArea');
  const div=document.createElement('div');
  div.className='dmg-float';
  div.style.cssText=`left:${x}px;top:${y}px;color:${color};font-size:${val>30?18:13}px`;
  div.textContent=(val>0?'-':'')+val;
  area.appendChild(div);
  setTimeout(()=>div.remove(),900);
}

function updateHpBar(who,hp,maxHp){
  const pct=clamp(hp/maxHp*100,0,100);
  const bar=document.getElementById(who+'HpBar');
  bar.style.width=pct+'%';
  if(pct<30)bar.classList.add('low');else bar.classList.remove('low');
  document.getElementById(who+'HpText').textContent=`${Math.max(0,Math.round(hp))}/${Math.round(maxHp)}`;
}
function updateMpBar(){
  const pct=clamp(G.player.mp/G.player.maxMp*100,0,100);
  document.getElementById('playerMpBar').style.width=pct+'%';
  document.getElementById('playerMpText').textContent=`${Math.round(G.player.mp)}/${G.player.maxMp}`;
}
function updateXpBar(){
  const pct=clamp(G.xp/G.xpNeeded*100,0,100);
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('xpText').textContent=`${G.xp}/${G.xpNeeded}`;
}

function renderSkills(){
  updateStatusBar();
  const bar=document.getElementById('skillsBar');
  const skills=ELEMENTS[G.elem].skills;
  bar.innerHTML=skills.map(sk=>`
    <button class="skill-btn" id="sk_${sk.id}" onclick="playClick();useSkill('${sk.id}')" ${G.player.mp<sk.cost||G.busy||!G.playerTurn?'disabled':''}>
      <span class="sk-icon">${sk.icon}</span>
      <span class="sk-name">${sk.name}</span>
      <span class="sk-cost">${sk.cost} MP</span>
      <span class="sk-desc">${sk.desc}</span>
    </button>
  `).join('');
}

function disableAll(v){
  document.querySelectorAll('.skill-btn,.act-btn').forEach(b=>b.disabled=v);
}

function spriteFX(id, cls, duration){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),duration);
}

/* ══════════════════════════════════════════
   ELEMENT SELECT
══════════════════════════════════════════ */
let selectedElem=null;
function selectElement(e){
  selectedElem=e;
  document.querySelectorAll('.elem-card').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`[data-elem="${e}"]`).classList.add('selected');

    `${el.name} — ATK:${el.stats.atk} DEF:${el.stats.def} SPD:${el.stats.spd} HP:${el.stats.hp}`;
  document.getElementById('confirmBtn').style.display='block';
}

/* ══════════════════════════════════════════
   START BATTLE
══════════════════════════════════════════ */
function startBattle(){
  if(!selectedElem)return;
  G.elem=selectedElem;
  G.stage=1; G.xp=0; G.xpNeeded=100; G.level=1;
  G.potions=3; G.kills=0; G.totalDmg=0;
  const stats=ELEMENTS[G.elem].stats;
  G.player={
    hp:stats.hp, maxHp:stats.hp,
    mp:stats.mp, maxMp:stats.mp,
    atk:stats.atk, def:stats.def, spd:stats.spd
  };
  G.won=false;
  showScreen('battleScreen');
  document.getElementById('stageNum').textContent=G.stage;
  document.getElementById('lvlNum').textContent=G.level;
  document.getElementById('playerName').textContent=ELEMENTS[G.elem].name;
  document.getElementById('elemIndicator').textContent=ELEMENTS[G.elem].name;
  document.getElementById('elemIndicator').style.color=ELEMENTS[G.elem].color;

  // player sprite — RIGHT side
  const ps=document.getElementById('playerSprite');
  ps.innerHTML='';
  ps.style.cssText=`position:absolute;bottom:20px;left:12%;right:auto;width:40px;height:60px;transform:scaleX(-1);${ELEMENTS[G.elem].playerCSS}`;
  // aura
  const aura=document.createElement('div');
  aura.className='aura';
  aura.id='playerAura';
  aura.style.background=`radial-gradient(circle,${ELEMENTS[G.elem].auraColor}0.35),transparent 70%)`;
  ps.appendChild(aura);

  spawnEnemy();
  renderSkills();
  updateHpBar('player',G.player.hp,G.player.maxHp);
  updateMpBar();
  updateXpBar();
  document.getElementById('potionCount').textContent=G.potions;
  document.getElementById('battleLog').innerHTML='';
  initAudio();
  addLog('⚔️ المعركة بدأت! اختار هجومك.',type='special');
  G.busy=false; G.playerTurn=true;
  G.burning=0; G.eBurning=0; G.eDebuffAtk=0; G.eDebuffDef=0; G.pDefBuff=0;
}

/* ══════════════════════════════════════════
   SPAWN ENEMY
══════════════════════════════════════════ */
function spawnEnemy(){
  const pool=G.stage<=2?ENEMIES_BY_STAGE[0]:G.stage<=4?ENEMIES_BY_STAGE[1]:ENEMIES_BY_STAGE[2];
  const base=pool[rnd(0,pool.length-1)];
  const scale=1+G.stage*0.12;
  G.enemy={
    ...base,
    hp: Math.round(base.hp*scale),
    maxHp: Math.round(base.hp*scale),
    atk: Math.round(base.atk*scale),
    def: Math.round(base.def*scale),
  };
  G.eBurning=0; G.eDebuffAtk=0; G.eDebuffDef=0;

  const es=document.getElementById('enemySprite');
  es.style.cssText=`position:absolute;bottom:20px;right:12%;left:auto;${base.css}`;
  es.classList.remove('dead');
  es.style.opacity='1';

  document.getElementById('enemyName').textContent=`${base.name} ${base.icon}`;
  updateHpBar('enemy',G.enemy.hp,G.enemy.maxHp);

  // weakness display
  const weakDiv=document.getElementById('enemyWeakness');
  weakDiv.innerHTML='';
  const elemEl=ELEMENTS[G.elem];
  if(G.enemy.elem===G.elem||G.enemy.elem==='none'){
    // no special
  } else if(elemEl.strongAgainst===G.enemy.elem){
    weakDiv.innerHTML=`<span class="strength-badge">✓ ضعيف أمامك!</span>`;
  } else if(G.enemy.elem===elemEl.strongAgainst){
    weakDiv.innerHTML=`<span class="weakness-badge">⚠ خطر عليك!</span>`;
  }

  addLog(`▶ ${G.enemy.name} ظهر! HP:${G.enemy.hp} ATK:${G.enemy.atk}`, 'info');
  flashScreen('rgba(100,50,200,.12)',100);
}

/* ══════════════════════════════════════════
   SKILLS
══════════════════════════════════════════ */
function calcDmg(atk, def, power, elemBonus=1){
  let base = (atk * power) - (def * 0.4);
  base = Math.max(1, base);
  base *= elemBonus;
  base += rnd(-2,2);
  return Math.round(base);
}

function useSkill(id){
  if(G.busy||!G.playerTurn)return;
  const skills=ELEMENTS[G.elem].skills;
  const sk=skills.find(s=>s.id===id);
  if(!sk||G.player.mp<sk.cost)return;
  G.busy=true; G.playerTurn=false;
  disableAll(true);
  G.player.mp-=sk.cost;
  updateMpBar();

  spriteFX('playerSprite','attacking',350);

  // elem bonus
  let bonus=1;
  const me=ELEMENTS[G.elem];
  if(me.strongAgainst===G.enemy.elem) bonus=1.5;
  if(me.weakTo===G.enemy.elem) bonus=0.7;

  setTimeout(()=>{
    if(sk.type==='heal'){
      const heal=Math.round(G.player.maxHp*sk.power);
      G.player.hp=Math.min(G.player.maxHp,G.player.hp+heal);
      if(sk.id==='heal2') G.pDefBuff=2;
      addLog(`💚 استرجعت ${heal} HP!`,'good');
      showDmg(60,80,'+'+heal,'#00ff88');
      updateHpBar('player',G.player.hp,G.player.maxHp);
      G.totalDmg+=0;
    } else {
      let hits=sk.multi||1;
      let totalDmg=0;
      for(let h=0;h<hits;h++){
        const def=Math.max(0,G.enemy.def-G.eDebuffDef);
        const d=calcDmg(G.player.atk,def,sk.power,bonus);
        G.enemy.hp=Math.max(0,G.enemy.hp-d);
        totalDmg+=d;
        G.totalDmg+=d;
      }
      spriteFX('enemySprite','hurt',400);
      showDmg(260,50,totalDmg,'#ff4444');
      flashScreen('rgba(255,80,0,.1)',80);
      addLog(`⚔️ ${sk.name}: ${totalDmg} ضرر!`,'good');
      updateHpBar('enemy',G.enemy.hp,G.enemy.maxHp);

      // effects
      if(sk.effect==='burn') G.eBurning=3;
      if(sk.effect==='bigburn'){G.eBurning=4;addLog('🔥 العدو محترق!','special');}
      if(sk.id==='waterjet'){G.eDebuffDef=Math.round(G.enemy.def*0.3);addLog('💧 دفاع العدو نقص!','good');}
      if(sk.id==='nightmare'){G.eDebuffAtk=Math.round(G.enemy.atk*0.35);G.eDebuffDef=Math.round(G.enemy.def*0.35);addLog('🌑 العدو ضعف!','good');}
      if(sk.id==='cyclone'){addLog('🌪️ العدو محيّر!','good');}
    }
    renderSkills();

    if(G.enemy.hp<=0){
      enemyDied();
    } else {
      setTimeout(enemyTurn, 700);
    }
  },400);
}

/* ══════════════════════════════════════════
   ENEMY TURN
══════════════════════════════════════════ */
function enemyTurn(){
  // burn effect on enemy
  if(G.eBurning>0){
    const bd=rnd(4,8);
    G.enemy.hp=Math.max(0,G.enemy.hp-bd);
    G.eBurning--;
    updateHpBar('enemy',G.enemy.hp,G.enemy.maxHp);
    addLog(`🔥 حرق: -${bd} للعدو`,'special');
    if(G.enemy.hp<=0){enemyDied();return;}
  }

  spriteFX('enemySprite','attacking',400);
  setTimeout(()=>{
    const eAtk=Math.max(1,G.enemy.atk-G.eDebuffAtk);
    const pDef=G.player.def+G.pDefBuff*3;
    let d=Math.round(Math.max(1, eAtk - pDef*0.35 + rnd(-2,3)));

    // elem penalty
    const me=ELEMENTS[G.elem];
    if(G.enemy.elem===me.weakTo) d=Math.round(d*1.4);
    if(me.strongAgainst===G.enemy.elem) d=Math.round(d*0.7);

    G.player.hp=Math.max(0,G.player.hp-d);
    G.totalDmg+=0;

    // burn on player
    if(G.burning>0){
      const pb=rnd(3,6);
      G.player.hp=Math.max(0,G.player.hp-pb);
      G.burning--;
      addLog(`🔥 أنت محترق! -${pb}`,'bad');
    }
    if(G.pDefBuff>0)G.pDefBuff--;

    spriteFX('playerSprite','hurt',400);
    showDmg(60,50,d,'#ff3333',true);
    flashScreen('rgba(255,0,0,.15)',100);
    addLog(`👿 ${G.enemy.name} يهاجم! -${d}`,'bad');
    updateHpBar('player',G.player.hp,G.player.maxHp);

    // regen MP
    G.player.mp=Math.min(G.player.maxMp,G.player.mp+8);
    updateMpBar();

    if(G.player.hp<=0){
      playerDied();
    } else {
      G.playerTurn=true;
      G.busy=false;
      renderSkills();
      disableAll(false);
    }
  },450);
}

/* ══════════════════════════════════════════
   WIN / LOSE
══════════════════════════════════════════ */
function enemyDied(){
  spriteFX('enemySprite','dead',600);
  addLog(`✅ ${G.enemy.name} مات! +${G.enemy.xp} XP`,'good');
  playSound('arcade/play2.wav',0.7);
  flashScreen('rgba(255,200,0,.18)',150);
  shakeArena();
  showVictoryText('✓ WIN!');
  G.kills++;
  G.xp+=G.enemy.xp;

  // level up check
  let didLevel=false;
  while(G.xp>=G.xpNeeded){
    G.xp-=G.xpNeeded;
    G.level++;
    G.xpNeeded=Math.round(G.xpNeeded*1.4);
    G.player.maxHp+=10; G.player.hp=Math.min(G.player.maxHp,G.player.hp+15);
    G.player.maxMp+=8;  G.player.mp=Math.min(G.player.maxMp,G.player.mp+10);
    G.player.atk+=2;    G.player.def+=1;
    didLevel=true;
    document.getElementById('lvlNum').textContent=G.level;
  }
  if(didLevel){
    addLog(`⬆️ LEVEL UP! LV.${G.level}!`,'special');
    flashScreen('rgba(0,255,200,.2)',200);
    showVictoryText(`⬆️ LV.${G.level}!`);
  }

  updateXpBar();
  updateHpBar('player',G.player.hp,G.player.maxHp);
  updateMpBar();

  if(G.kills>=10){
    // win condition after 10 kills
    setTimeout(()=>showResult(true),800);
    return;
  }

  G.stage=Math.floor(G.kills/2)+1;
  document.getElementById('stageNum').textContent=G.stage;
  G.busy=false; G.playerTurn=true;

  setTimeout(()=>{
    spawnEnemy();
    renderSkills();
    disableAll(false);
  },1200);
}

function playerDied(){
  addLog('💀 أنت متُّ!','bad');
  playSound('arcade/play3.wav',0.8);
  flashScreen('rgba(255,0,0,.35)',200);
  setTimeout(()=>showResult(false),1200);
}

/* ══════════════════════════════════════════
   RESULT
══════════════════════════════════════════ */
function showResult(win){
  G.won=win;
  showScreen('resultScreen');
  const titleEl=document.getElementById('resultTitle');
  titleEl.textContent=win?'🏆 فزت!':'💀 خسرت!';
  titleEl.className='result-title '+(win?'win':'lose');

  document.getElementById('resultStats').innerHTML=`
    <div class="stat-row-r"><span>عنصرك</span><span class="stat-val-r">${ELEMENTS[G.elem].name}</span></div>
    <div class="stat-row-r"><span>المستوى</span><span class="stat-val-r">LV.${G.level}</span></div>
    <div class="stat-row-r"><span>المراحل</span><span class="stat-val-r">Stage ${G.stage}</span></div>
    <div class="stat-row-r"><span>القتلى</span><span class="stat-val-r">${G.kills} عدو</span></div>
    <div class="stat-row-r"><span>XP المكتسب</span><span class="stat-val-r">${G.xp+G.level*G.xpNeeded}</span></div>
  `;

  const btn=document.getElementById('resultBtn');
  if(win){
    btn.textContent='▶ العب مرة ثانية';
    btn.onclick=()=>showScreen('selectScreen');
  } else {
    btn.textContent='▶ حاول تاني';
    btn.onclick=()=>startBattle();
  }
}

/* ══════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════ */
function usePotion(){
  if(G.potions<=0||G.busy||!G.playerTurn)return;
  G.potions--;
  document.getElementById('potionCount').textContent=G.potions;
  if(G.potions<=0)document.getElementById('potionBtn').disabled=true;
  const heal=Math.round(G.player.maxHp*0.35);
  G.player.hp=Math.min(G.player.maxHp,G.player.hp+heal);
  updateHpBar('player',G.player.hp,G.player.maxHp);
  showDmg(40,80,'+'+heal,'#00ff88');
  addLog(`🧪 بوشن: +${heal} HP`,'good');
  G.playerTurn=false; G.busy=true;
  setTimeout(()=>{
    enemyTurn();
  },300);
}

function fleeBattle(){
  if(rnd(1,3)===1){
    addLog('🏃 هربت بنجاح!','info');
    setTimeout(()=>showResult(false),600);
  } else {
    addLog('❌ الهروب فشل!','bad');
    G.playerTurn=false; G.busy=true;
    setTimeout(enemyTurn,400);
  }
}
</script>

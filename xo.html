<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة إكس-أو - MOHAND WORLD</title>
  <link rel="stylesheet" href="xo.css" />
</head>
<body>
  <div class="app">
    <!-- header -->
    <header class="topbar">
      <div class="brand">X • O — لعبة</div>
      <div class="controls">
        <button id="themeToggle" class="icon-btn" aria-label="تبديل الوضع">🌙</button>
      </div>
    </header>

    <!-- intro / mode select -->
    <section id="startScreen" class="center-screen">
      <h1>اختار نوع اللعبة</h1>
      <div class="mode-buttons">
        <button id="pvpBtn" class="big-btn">اللعب مع صديق</button>
        <button id="aiBtn" class="big-btn primary">اللعب مع الكمبيوتر</button>
      </div>
      <p class="hint">اللعب سريع — لو حد كسب بياخد نقطة، لو تعادل بنحسب تعادل ونعيد تلقائيًا</p>
    </section>

    <!-- game screen -->
    <section id="gameScreen" class="hidden">
      <div class="status-row">
        <div class="turn" id="turnHint">دور: <span id="turnPlayer">X</span></div>
        <div class="scoreboard">
          <div>X: <span id="scoreX">0</span></div>
          <div>تعادلات: <span id="scoreDraw">0</span></div>
          <div>O: <span id="scoreO">0</span></div>
        </div>
        <button id="restartBtn" class="small-btn">إعادة</button>
        <button id="homeBtn" class="small-btn">العودة للصفحة الرئيسية</button>        
      </div>

      <div id="board" class="board"></div>

      <div id="message" class="message hidden"></div>
      <div class="overlay" id="overlay"></div>
    </section>

    <footer class="footer">
      صنع بواسطة MOHAND WORLD — بالتوفيق 😉
    </footer>
  </div>

  <script src="xo.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="img/Brith.png" type="image/png">
<title>شهر ميلادك | Your Birth Month</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Righteous&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0b429;--gold2:#ffd166;--purple:#7c3aed;--purple2:#a855f7;--pink:#ec4899;--bg:#07050f;--text:#f0e6ff;--sub:#a89cc8}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;font-family:"Cairo",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(124,58,237,.18),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(236,72,153,.12),transparent 55%);pointer-events:none;z-index:0}

#hero{position:relative;z-index:1;text-align:center;padding:60px 20px 40px}
.game-tag{display:inline-block;font-family:"Righteous",sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold);background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.3);border-radius:30px;padding:6px 18px;margin-bottom:22px;text-transform:uppercase}
.hero-title{font-size:clamp(36px,8vw,72px);font-weight:900;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,var(--gold2) 40%,var(--purple2) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-en{font-family:"Righteous",sans-serif;font-size:clamp(14px,3vw,22px);color:var(--sub);letter-spacing:3px;margin-bottom:18px}
.hero-desc{font-size:15px;color:var(--sub);max-width:500px;margin:0 auto 40px;line-height:1.9}

#monthPicker{position:relative;z-index:1;padding:0 16px 20px;max-width:680px;margin:0 auto}
.pick-label{text-align:center;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:18px;text-transform:uppercase}
.months-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.month-btn{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 8px;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);text-align:center;color:var(--text);position:relative;overflow:hidden}
.month-btn:hover{transform:translateY(-4px) scale(1.04);border-color:rgba(168,85,247,.5);background:rgba(124,58,237,.1)}
.month-btn.active{border-color:var(--gold);transform:translateY(-4px) scale(1.06);background:rgba(240,180,41,.1)}
.month-num{font-family:"Righteous",sans-serif;font-size:11px;color:rgba(255,255,255,.3);margin-bottom:4px}
.month-ar{font-size:14px;font-weight:900}
.month-en{font-size:9px;color:var(--sub);font-family:"Righteous",sans-serif;letter-spacing:1px;margin-top:2px}

.reveal-btn-wrap{text-align:center;margin:30px 0 50px;position:relative;z-index:1}
#revealBtn{display:inline-flex;align-items:center;gap:10px;padding:16px 44px;font-family:"Cairo",sans-serif;font-size:17px;font-weight:900;color:#000;background:linear-gradient(135deg,var(--gold),var(--gold2),#ffeaa7);border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 32px rgba(240,180,41,.4);transition:all .28s cubic-bezier(.34,1.56,.64,1)}
#revealBtn:hover{transform:scale(1.07) translateY(-3px);box-shadow:0 14px 44px rgba(240,180,41,.55)}
#revealBtn:disabled{opacity:.35;cursor:default;transform:none}

#results{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 16px 80px;display:none}
.results-header{text-align:center;margin-bottom:40px}
.results-month-badge{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(236,72,153,.15));border:1px solid rgba(168,85,247,.4);border-radius:50px;padding:10px 28px;font-size:22px;font-weight:900;margin-bottom:16px;animation:badgePop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgePop{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.results-sub{font-size:15px;color:var(--sub)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.result-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;transition:all .3s ease;animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.result-card:hover{transform:translateY(-6px);border-color:rgba(168,85,247,.35);box-shadow:0 20px 40px rgba(0,0,0,.5),0 0 25px rgba(124,58,237,.12)}

.card-visual{width:100%;height:200px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-visual svg{position:absolute;inset:0;width:100%;height:100%}
.card-main-emoji{position:relative;z-index:2;font-size:72px;filter:drop-shadow(0 4px 24px rgba(0,0,0,.6)) drop-shadow(0 0 20px rgba(255,255,255,.15));transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.result-card:hover .card-main-emoji{transform:scale(1.18) rotate(-5deg)}
.card-top-badge{position:absolute;top:12px;right:12px;z-index:3;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 11px;border-radius:20px;backdrop-filter:blur(10px)}
.card-bottom-label{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:10px 14px 12px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);font-size:14px;font-weight:900;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9)}

.card-body{padding:16px 18px 20px}
.card-cat-q{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;opacity:.5}
.card-name{font-size:18px;font-weight:900;color:#fff;margin-bottom:8px;line-height:1.3}
.card-desc{font-size:12.5px;line-height:1.85;color:var(--sub)}

.actions-row{display:flex;gap:12px;justify-content:center;margin-top:44px;flex-wrap:wrap}
.act-btn{padding:12px 28px;border-radius:50px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--text);font-family:"Cairo",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:7px;text-decoration:none}
.act-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);transform:translateY(-2px)}
.act-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#000;font-weight:900}
.act-btn.gold:hover{box-shadow:0 8px 24px rgba(240,180,41,.4)}

.confetti-p{position:fixed;pointer-events:none;animation:cFall var(--d) ease forwards;z-index:999}
@keyframes cFall{0%{opacity:1;transform:translate(0,0) rotate(0deg)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--r))}}

footer{position:relative;z-index:1;text-align:center;padding:20px;color:rgba(255,255,255,.2);font-size:11px}
@media(max-width:480px){.months-grid{grid-template-columns:repeat(3,1fr)}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section id="hero">
  <div class="game-tag">✦ Birth Month Game ✦</div>
  <h1 class="hero-title">شهر ميلادك</h1>
  <div class="hero-en">Your Birth Month</div>
  <p class="hero-desc">اختر شهر ميلادك واكتشف 10 حاجات هتفاجئك عن نفسك! 🌟</p>
</section>

<section id="monthPicker">
  <div class="pick-label">✦ اختر شهرك ✦</div>
  <div class="months-grid" id="monthsGrid"></div>
</section>

<div class="reveal-btn-wrap">
  <button id="revealBtn" disabled onclick="reveal()">✨ اكتشف نتيجتك! 🔮</button>
</div>

<section id="results">
  <div class="results-header">
    <div class="results-month-badge" id="resultBadge">🎂</div>
    <div class="results-sub">هذا ما يقوله شهر ميلادك عنك!</div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="actions-row">
    <button class="act-btn gold" onclick="restart()">🔄 جرب شهر تاني</button>
    <button class="act-btn" onclick="shareResult()">📤 شارك النتيجة</button>
    <a href="index.html" class="act-btn">🏠 الرئيسية</a>
  </div>
</section>
<footer><a href="index.html" style="color:rgba(255,255,255,.2);text-decoration:none">← MOHAND WORLD</a></footer>

let sel = -1;

function buildMonths(){
  const g = document.getElementById("monthsGrid");
  MONTHS.forEach((m,i)=>{
    const b = document.createElement("button");
    b.className = "month-btn";
    b.innerHTML = `<div class="month-num">${m.num}</div><div class="month-ar">${m.ar}</div><div class="month-en">${m.en}</div>`;
    b.onclick = ()=>{
      document.querySelectorAll(".month-btn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      sel = i;
      document.getElementById("revealBtn").disabled = false;
    };
    g.appendChild(b);
  });
}

function reveal(){
  if(sel<0) return;
  const m = MONTHS[sel];
  document.getElementById("resultBadge").textContent = "🎂 "+m.ar+" — "+m.en;
  const grid = document.getElementById("cardsGrid");
  grid.innerHTML = "";

  CATS.forEach((cat,ci)=>{
    const item = D[cat.id][sel];
    const svg  = SVG_BG[cat.id](item.e);
    const bstyle = BADGE_STYLE[cat.id];

    const card = document.createElement("div");
    card.className = "result-card";
    card.style.animationDelay = (ci*0.08)+"s";
    card.innerHTML = `
      <div class="card-visual">
        ${svg}
        <div class="card-main-emoji">${item.e}</div>
        <div class="card-top-badge" style="${bstyle}">${cat.icon} ${cat.id==="anime"?"أنمي":cat.id==="car"?"سيارة":cat.id==="house"?"منزل":cat.id==="hero"?"بطل":cat.id==="power"?"قوة":cat.id==="pet"?"حيوان":cat.id==="game"?"لعبة":cat.id==="travel"?"سفر":cat.id==="music"?"موسيقى":"رياضة"}</div>
        <div class="card-bottom-label">${item.n}</div>
      </div>
      <div class="card-body">
        <div class="card-cat-q">${cat.icon} ${cat.q}</div>
        <div class="card-name">${item.e} ${item.n}</div>
        <div class="card-desc">${item.d}</div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById("results").style.display = "block";
  document.getElementById("results").scrollIntoView({behavior:"smooth",block:"start"});
  setTimeout(confetti, 300);
}

function confetti(){
  const cols=["#f0b429","#ffd166","#7c3aed","#ec4899","#3b82f6","#4ade80","#f87171","#c084fc"];
  for(let i=0;i<65;i++) setTimeout(()=>{
    const p=document.createElement("div");
    p.className="confetti-p";
    const x=Math.random()*innerWidth, tx=(Math.random()-.5)*220, ty=-(260+Math.random()*360);
    const r=(Math.random()*720)+"deg", d=(.7+Math.random()*1)+"s";
    p.style.cssText=`left:${x}px;bottom:0;width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()<.5?"50%":"3px"};--tx:${tx}px;--ty:${ty}px;--r:${r};--d:${d}`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1800);
  },i*25);
}

function restart(){
  document.getElementById("results").style.display="none";
  document.querySelectorAll(".month-btn").forEach(b=>b.classList.remove("active"));
  sel=-1;
  document.getElementById("revealBtn").disabled=true;
  window.scrollTo({top:0,behavior:"smooth"});
}

function shareResult(){
  if(sel<0)return;
  const m=MONTHS[sel];
  const txt=`🎂 شهر ميلادي ${m.ar} كشف أسراري!\nجربت "شهر ميلادك" واكتشفت شخصيتي في الأنمي وسيارتي وبيتي وأكتر! 🔮\nجرب أنت — MOHAND WORLD ✨`;
  if(navigator.share) navigator.share({title:"شهر ميلادك",text:txt});
  else navigator.clipboard.writeText(txt).then(()=>alert("تم النسخ! 🎉")).catch(()=>{});
}
